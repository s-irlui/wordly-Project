<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Wordly Dictionary</h1>

        <!-- Search Form -->
        <form id="searchForm">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter a word..." 
                required
            >
            <button type="submit">Search</button>
        </form>

        <!-- Error Message -->
        <p id="errorMessage" class="hidden"></p>

        <!-- Results Section -->
        <div id="result">

            <h2 id="word"></h2>

            <p id="pronunciation"></p>

            <p id="partOfSpeech"></p>

            <p id="definition"></p>

            <p id="example"></p>

            <p id="synonyms"></p>

            <!-- Audio -->
            <audio id="audio" controls class="hidden"></audio>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
